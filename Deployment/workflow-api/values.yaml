hostname: workflow-api.local
ingressClass: nginx
repo: datanosecr.azurecr.io
tag: latest
certificateName: milestones-tst-fnwi-uva-nl
environment: Test
contentSecurityPolicy: "default-src 'self'"
logLevel: Debug

# By default, uses the 'main' branch. To point this environment at a different branch or commit, add `ref: <branch name or commit SHA>`.
workflowSource:
  repoUrl: ""

# Nightly `rollout restart` so prod re-fetches config once a day. Enable in prod's values only.
nightlyRestart: false

allowedOrigins: "http://localhost:5173,https://*.instructure.com"
frontendBaseUrl: "http://localhost:5173"

datanoseApi:
  baseAddress: https://api-v2-tst.datanose.nl/
  dn1Url: https://tst.datanose.nl/

graph:
  tenantId: tenantId
  clientId: clientId
  senderId: no-reply-milestones@uva.nl
  
surfConext:
  baseUrl: https://connect.test.surfconext.nl
  clientId: datanose-api.local

eduId:
  authority: https://login.test.eduid.nl
  invitationApiUrl: https://eduid-invite-proxy-tst.datanose.nl
  roleIdentifier: 7040
  invitationExpiryDays: 30
  roleExpiryDays: 365
  internalEmailDomains:
    - uva.nl
    - auc.nl

canvasLti:
  clientId: "104400000000000348"
  authenticateUrl: https://uvadlo-dev.instructure.com/api/lti/authorize_redirect
  jwksUrl: https://uvadlo-dev.instructure.com/api/lti/security/jwks
  teacherTarget: /screens/project-overview

mongo:
  username: username
  database: workflow
  host: host
  port: 27017

s3:
  serviceUrl: https://28a4a3bb78d84983ada53ddac7c7c6be.ams.objectstore.eu
  authenticationRegion: EU
  accessKey: 961536c212464fcca2219b08315ef5b8

azure:
  keyvaultName: keyvaultName
  resourceGroup: resourceGroupName
  subscriptionId: subscriptionId
  tenantId: tenantId
  clientId: clientId
  identityName: identityName
  secrets:
    - name: workflow-db-password
      key: Mongo__Password
    - name: workflow-dn2-api-key
      key: DataNoseApi__ApiKey
    - name: workflow-encryption-secret
      key: Encryption__Secret
    - name: workflow-surfconext-client-secret
      key: SurfConext__ClientSecret
    - name: eduid-invite-proxy-milestones-role-token
      key: EduId__InvitationApiToken
    - name: workflow-canvas-lti-key
      key: CanvasLti__Key
    - name: workflow-impersonation-key
      key: ImpersonationKey
    - name: workflow-s3-secret-key
      key: S3__SecretKey
    - name: workflow-s3-signing-key
      key: S3__SigningKey
    - name: workflow-dn2-api-key
      key: Services__DataNose__Token
    - name: dn2-api-key
      key: Authentication__ApiKey
    - name: workflow-graph-client-secret
      key: GraphMail__ClientSecret
