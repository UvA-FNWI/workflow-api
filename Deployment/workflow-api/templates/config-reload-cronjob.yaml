{{- if .Values.nightlyRestart }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-api-restarter
  namespace: "{{ .Release.Namespace }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-api-restarter
  namespace: "{{ .Release.Namespace }}"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-api-restarter
  namespace: "{{ .Release.Namespace }}"
subjects:
  - kind: ServiceAccount
    name: workflow-api-restarter
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: Role
  name: workflow-api-restarter
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workflow-api-nightly-restart
  namespace: "{{ .Release.Namespace }}"
spec:
  schedule: "0 2 * * *"
  timeZone: "Europe/Amsterdam"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: workflow-api-restarter
          restartPolicy: OnFailure
          containers:
            - name: restart
              image: bitnami/kubectl:1.31
              command: ["kubectl", "rollout", "restart", "deployment/workflow-api"]
{{- end }}
