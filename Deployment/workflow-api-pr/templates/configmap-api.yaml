apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-api-config
  namespace: "{{ .Release.Namespace }}"
data:
  DOTNET_ENVIRONMENT: "{{ .Values.environment }}"

  Serilog__MinimumLevel__Override__Uva.DataNose: "{{ .Values.logLevel }}"
  
  DataNoseApi__BaseAddress: "{{ .Values.datanoseApi.baseAddress }}"
  GraphMail__TenantId: "{{ .Values.graph.tenantId }}"
  GraphMail__ClientId: "{{ .Values.graph.clientId }}"
  GraphMail__UserAccount: "{{ .Values.graph.userAccount }}"
  GraphMail__OverrideRecipient: "{{ .Values.graph.overrideRecipient }}"
  
  AllowedOrigins: "{{ .Values.allowedOrigins }}"
  FrontendBaseUrl: "{{ .Values.frontendBaseUrl }}"

  SurfConext__BaseUrl: "{{ .Values.surfConext.baseUrl }}"
  SurfConext__ClientId: "{{ .Values.surfConext.clientId }}"
  EduId__Authority: "{{ .Values.eduId.authority }}"
  EduId__InvitationApiUrl: "{{ .Values.eduId.invitationApiUrl }}"
  EduId__RoleIdentifier: "{{ .Values.eduId.roleIdentifier }}"
  EduId__InvitationExpiryDays: "{{ .Values.eduId.invitationExpiryDays }}"
  EduId__RoleExpiryDays: "{{ .Values.eduId.roleExpiryDays }}"
  {{- range $i, $domain := .Values.eduId.internalEmailDomains }}
  EduId__InternalEmailDomains__{{ $i }}: "{{ $domain }}"
  {{- end }}

  CanvasLti__ClientId: "{{ .Values.canvasLti.clientId }}"
  CanvasLti__AuthenticateUrl: "{{ .Values.canvasLti.authenticateUrl }}"
  CanvasLti__JwksUrl: "{{ .Values.canvasLti.jwksUrl }}"
  CanvasLti__TeacherTarget: "{{ .Values.canvasLti.teacherTarget }}"

  Mongo__Username: "{{ .Values.mongo.username }}"
  Mongo__Database: "{{ .Values.mongo.database }}"
  Mongo__Host: "{{ .Values.mongo.host }}"
  Mongo__Port: "{{ .Values.mongo.port }}"
