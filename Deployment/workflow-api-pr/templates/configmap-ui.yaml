apiVersion: v1
kind: ConfigMap
metadata:
    name: workflow-ui-configmap
    namespace: "{{ .Release.Namespace }}"
data:
    env-contents: |
        window._env = {
            VITE_WEBAPI_URL: "{{ .Values.envVars.webapiUrl }}",
            VITE_ENV: "{{ .Values.envVars.env }}",
            VITE_AUTH_AUTHORITY: "{{ .Values.envVars.authAuthority }}",
            VITE_AUTH_CLIENT_ID: "{{ .Values.envVars.authClientId }}",
            VITE_AUTH_LOGOUT_URL: "{{ .Values.envVars.authLogoutUrl }}"
        };
