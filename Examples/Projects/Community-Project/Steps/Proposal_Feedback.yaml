name: Proposal_Feedback

title: Proposal Feedback

actions:
  - roles: [Coordinator]
    type: Submit
    form: ProposalApprove
    label: Approve Proposal
  - roles: [Coordinator]
    type: Submit
    form: ProposalReject
    label: Reject Proposal
  - roles: [Coordinator]
    type: Submit
    form: ProposalRevise
    label: Proposal Revision

properties:
  - name: Feedback
    text: Feedback
    type: String!
    layout:
      multiline: true

  - name: RevisionDeadline
    text: Revision deadline
    type: Date!

progress:
  color: Red
  text:
    en: Waiting for approval {{ coalesce(formatDate(ProposalEvent, =dd-MM-yyyy), =) }}
    nl: Wacht op goedkeuring {{ coalesce(formatDate(ProposalEvent, =dd-MM-yyyy), =) }}

ends: 
  logical:
    operator: Or
    children: 
    - event: ProposalApprove
    - event: ProposalReject
    - event: ProposalRevise
