name: Proposal_Submit

title:
  nl: Proposal Submission
  en: Proposal Submission

actions:
  - roles: [Student]
    type: Submit
    form: Proposal
  
properties:
  - name: GuidelinesRead
    type: Boolean!
    text:
      en: I have read the Internship and community projects application guidelines
      nl: I have read the Internship and community projects application guidelines

  - name: ProjectPeriod
    text: Period
    type: ProjectPeriod!
    description: In the 4-week period, students are allowed to do either a course OR a CPI project.
    values:
      - name: CrossPeriod
        text: Cross-period
      - name: Autumn
        text: Autumn
      - name: January
        text: January
      - name: Spring
        text: Spring
      - name: June
        text: June
      - name: Summer
        text: Summer
    layout:
      type: Dropdown

  - name: CrossPeriod
    text: Cross-period
    type: CrossPeriod!
    values:
      - name: AutumnJanuary
        text: Autumn-January
      - name: AutumnJune
        text: Autumn-June
      - name: AutumnSpring
        text: Autumn-Spring
      - name: JanuarySpring
        text: January-Spring
      - name: JanuaryJune
        text: January-June
      - name: JanuarySummer
        text: January-Summer
      - name: SpringJune
        text: Spring-June
      - name: SpringSummer
        text: Spring-Summer
      - name: JuneSummer
        text: June-Summer
      - name: Other
        text: Other
    condition:
      value:
        property: ProjectPeriod
        equal: =CrossPeriod
    layout:
      type: Dropdown

  - name: OtherCrossStart
    text: Start other cross-period
    type: Month!
    condition:
      value:
        property: CrossPeriod
        equal: =Other
    layout:
      type: Dropdown

  - name: OtherCrossEnd
    text: End other cross-period
    type: Month!
    condition:
      value:
        property: CrossPeriod
        equal: =Other
    layout:
      type: Dropdown

  - name: StartDate
    text: Start
    type: DateTime!

  - name: EndDate
    text: End
    type: DateTime!

  - name: Title
    text: Title CP/I project
    type: String!

  - name: Organisation
    text: Organisation
    type: String!

  - name: City
    text: City
    type: String!

  - name: Country
    text: Country
    type: Country!
    layout:
      type: Dropdown

  - name: Supervisor
    text: Supervisor
    type: User!

  - name: GraduationDate
    text: Expected graduation date
    type: GraduationDate!
    values:
      - name: 02_2027
        text: February 2027
      - name: 06_2027
        text: June 2027
      - name: 02_2028
        text: February 2028
      - name: 06_2028
        text: June 2028
      - name: 02_2029
        text: February 2029
      - name: 06_2029
        text: June 2029
      - name: 02_2030
        text: February 2030
      - name: 06_2030
        text: June 2030
    layout:
      type: Dropdown

  - name: AdditionalRemarks
    text: Additional Remarks
    type: String
    layout:
      multiline: true

  - name: Description
    text: Description of Community Project partner and project
    type: String!
    description: 100-200 words
    layout:
      multiline: true

  - name: Motivation
    text: Motivation
    type: String!
    description: 200-500 words
    layout:
      multiline: true

  - name: LearningObjectives
    text: Learning objectives
    type: String!
    description: 100-200 words
    layout:
      multiline: true

  - name: HoursBreakdown
    text: Hours breakdown
    type: String!
    layout:
      multiline: true

  - name: SupervisorAcceptanceForm
    text: Supervisor acceptance form
    type: File!
    description: Please upload form signed by your supervisor. [You can find the supervisor acceptance form on the CP/I page on student.auc.nl](https://student.auc.nl/shared-content/a-z/community-projects-and-internships-cpi/community-projects-and-internships-cpi.html)

ends:
  event:
    id: Proposal

