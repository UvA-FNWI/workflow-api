name: ProposalRevisionStudent
layout: default
subject: "Further refinement of your thesis proposal needed"
body: |
    Dear {{ coalesce(Student.DisplayName, =student) }},
    
    Thank you for submitting your Community Project proposal. Before you can proceed, some adjustments are needed.
    
    We understand this may be frustrating, but you don't have to start all over again! 
    
    Log in to see what was already fine and what needs to be adjusted.
    The coordinator is looking forward to your updated version - good luck!

buttons:
  - label: "View your Project page"
    url: "{{ FrontendBaseUrl }}/instance/{{ Id }}"
    