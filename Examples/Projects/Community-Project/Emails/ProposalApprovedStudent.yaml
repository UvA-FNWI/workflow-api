name: ProposalApprovedStudent
layout: default
subject: "Your thesis proposal has been approved"
body:
  en: |
    Dear {{ coalesce(Student.DisplayName, =student) }},
    
    Congratulations! Your Community Project proprosal has been approved.<br>
    You can find the coordinator's feedback on your proposal on your project's overview page.
    
    
  nl: |
    Beste {{ coalesce(Student.DisplayName, =student) }},
    
    Gefeliciteerd! Je voorstel voor het Community Project is goedgekeurd.<br>
    Je kunt de feedback van de coordinator op je voorstel vinden op de overzichtspagina.

buttons:
  - label: "View your Project page"
    url: "{{ FrontendBaseUrl }}/instance/{{ Id }}"