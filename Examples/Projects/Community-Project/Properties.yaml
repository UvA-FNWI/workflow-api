properties:
  - name: StartDate
    type: Date!
    text:
      en: Start date
      nl: Startdatum
    validation:
      message:
        en: Start date must be in the future
        nl: Startdatum moet in de toekomst liggen
      value:
        property: StartDate
        greaterThan: now

  - name: EndDate
    type: Date!
    text:
      en: End date
      nl: Einddatum
    validation:
      message:
        en: End date must be after start date
        nl: Einddatum moet na de startdatum zijn
      value:
        property: EndDate
        greaterThan: StartDate
