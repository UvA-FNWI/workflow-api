properties:
  - name: Course
    type: Context!
    inheritedRoles: [Coordinator, Impersonator]
    
  - name: Title
    type: String!
    text:
      en: Working title
      nl: Werktitel
  - name: EC
    type: Int!

  - name: StartDate
    type: Date!
    text:
      en: Start date
      nl: Startdatum
    validation:
      message:
        en: Start date must be in the future
        nl: Startdatum moet in de toekomst liggen
      value:
        property: StartDate
        greaterThan: now
        
  - name: EndDate
    type: Date!
    text:
      en: End date
      nl: Einddatum
    validation:
      message:
        en: End date must be after start date
        nl: Einddatum moet na de startdatum zijn
      value:
        property: PlannedEndDate
        greaterThan: StartDate

  - name: Examiner
    type: User!
    text: 
      en: Examiner
      nl: Examinator
  - name: Supervisor
    type: User!
    text: 
      en: Supervisor
      nl: Begeleider
  - name: Reviewer
    type: User!
    text: 
      en: Reviewer
      nl: Beoordelaar
  - name: Student
    type: User!

