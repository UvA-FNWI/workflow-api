name: Projects-CP
workflowDefinition: Community-Project
columns:
  - title:
      en: Summary
      nl: Samenvatting
    value: "{{Title}} - EC: {{EC}} - Examiner: {{Examiner.DisplayName}}"
    defaultSort: "Descending"
  - property: Title
    link: true
    default: No title
  - property: Course.Name
    title:
      en: Course
      nl: Vak
  - property: StartEvent
  - currentStep: true
    filterType: Pick
    default: Draft

grouping:
  groups:
    - name: assign-subject
      title: Proposal
      steps:
        - Proposal
        - Proposal_Submit
        - Proposal_Feedback

    - name: Project-in-progress
      title: Project in Progress
      steps:
        - LearningPlan
        - InterimLearningPlan
        - FinalReport
    
    - name: assessment-in-progress
      title: Assessment in Progress
      steps:
        - Assessment
  