name: Projects-CP
workflowDefinition: Community-Project
columns:
  - property: Student.DisplayName
    title: Student
    defaultSort: "Descending"
    link: true
  - title: Project
    value: "{{Title}} - EC: {{EC}} - Examiner: {{Examiner.DisplayName}}"
  - property: Course.Name
    title: Course
  - property: StartEvent
    title: Start
  - currentStep: true
    filterType: Pick
    default: Draft

grouping:
  groups:
    - name: assign-subject
      title: Proposal
      steps:
        - Proposal
        - Proposal_Submit
        - Proposal_Feedback

    - name: Project-in-progress
      title: Project in Progress
      steps:
        - LearningPlan
        - InterimLearningPlan
        - FinalReport
    
    - name: assessment-in-progress
      title: Assessment in Progress
      steps:
        - Assessment
  