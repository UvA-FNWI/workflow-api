name: AssessmentExaminer
title:
  en: Assessment (examiner)
  nl: Beoordeling (examinator)

pages:
  - name: Declarations
    title:
      en: Declarations
      nl: Verklaringen
    introduction:
      en: Please review the plagiarism report generated by Turnitin before continuing.
      nl: Bekijk het door Turnitin gegenereerde plagiaatrapport voordat je verdergaat.
    fields:
      - PlagiarismReportUrl
      - FraudChecked

  - name: Product
    title:
      en: Product
      nl: Product
    fields:
      - ProductAbstract
      - ProductIntroduction
      - ProductMethods
      - ProductResults
      - ProductDiscussionConclusion
      - ProductReadability
      - ProductComments

  - name: Process
    title:
      en: Process
      nl: Process
    fields:
      - ProcessPreparationMethodology
      - ProcessExperimentalSkills
      - ProcessReliabilityReproducibility
      - ProcessInterpretingResults
      - ProcessIndependenceInitiative
      - ProcessCommunicationCollaboration
      - ProcessPlanningTimeManagement

  - name: Presentation
    title:
      en: Presentation
      nl: Presentatie
    fields:
      - PresentationContextualizationDelivery
      - PresentationClarityStyle
      - PresentationHandlingQuestions

  - name: FinalRemarks
    title:
      en: Final Remarks
      nl: Eindopmerkingen
    fields:
      - SummaryComments
      - Laudatio
      - ConsentExaminerName
        
onSubmit:
  - sendMail:
      template: AssessmentRequestAssessor
