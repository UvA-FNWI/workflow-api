name: AssessmentRequestAssessor
layout: default
toAddress: "replaced-by-override@mail.com"
subject:
  en: "Indicate whether you agree with the assessment for the thesis of {{ Student.DisplayName[0] }}"
  nl: "Geef aan of je het eens bent met de beoordeling voor de scriptie van {{ Student.DisplayName[0] }}"
body:
  en: |
    Dear {{ SecondReviewer.DisplayName[0] }},
    
    The thesis of **{{ Student.DisplayName[0] }}** has been assessed by the supervisor.<br>
    You are the second reader for this thesis.
   
    Could you please let us know as soon as possible whether you agree with this assessment or not?<br>
    Please provide this **before {{ formatDate(addWeeks(UploadFinalThesisEvent, 2), =dd-MM-yyyy) }}**. That is in {{ daysUntil(now, addWeeks(UploadFinalThesisEvent, 2)) }} days.
    
    Could you assess this thesis as soon as you have time for it?<br>
    Thanks in advance, also on behalf of the student (who is eagerly waiting for a final grade).
  nl: |
    Beste {{ SecondReviewer.DisplayName[0] }},
    
    De scriptie van **{{ Student.DisplayName[0] }}** is beoordeeld door de begeleider.<br>
    Jij bent voor deze scriptie de 2e beoordelaar.
   
    Wil je zo snel mogelijk doorgeven of je wel of niet akkoord bent met deze beoordeling?<br>
    Geef dit **uiterlijk op {{ formatDate(addWeeks(UploadFinalThesisEvent, 2), =dd-MM-yyyy) }}** door. Dat is over {{ daysUntil(now, addWeeks(UploadFinalThesisEvent, 2)) }} dagen.
    
    Wil je deze scriptie beoordelen zodra je hier tijd voor hebt?<br>
    Alvast bedankt, ook names de student (die vol spanning op een eindcijfer wacht).
buttons:
  - label:
      en: "Assess thesis"
      nl: "Beoordeel scriptie"
    url: "{{ FrontendBaseUrl }}/instance/{{ Id }}"