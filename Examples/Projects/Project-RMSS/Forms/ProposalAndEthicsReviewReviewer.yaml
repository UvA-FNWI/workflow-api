name: ProposalAndEthicsReviewReviewer
title:
  en: Proposal and ethics review (proposal reviewer)
  nl: Beoordeling voorstel en ethiek (voorstelbeoordelaar)

property: ReviewerProposalAndEthicsReview
targetForm: ProposalAndEthicsReview
step: ProposalAssessmentReviewer

emitFormSubmitEvent: false
submittedWhenEvents: [ ProposalApprovedReviewer, ProposalRejectedReviewer ]

onSubmit:
  - condition:
      logical:
        operator: And
        children:
          - value:
              property: ReviewerProposalAndEthicsReview.ProposalSufficient
              equal: =Pass
          - value:
              property: ReviewerProposalAndEthicsReview.EthicsSufficient
              equal: =Pass
    event: ProposalApprovedReviewer

  - condition:
      logical:
        operator: Or
        children:
          - value:
              property: ReviewerProposalAndEthicsReview.ProposalSufficient
              equal: =Fail
          - value:
              property: ReviewerProposalAndEthicsReview.EthicsSufficient
              equal: =Fail
    event: ProposalRejectedReviewer
    
    # If both assessments are done and either one has a rejection, create the ProposalReturnedForRevision event.
  - condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedSupervisor
                - event: ProposalRejectedSupervisor
          - logical:
              operator: Or
              children:
                - event: ProposalRejectedSupervisor
                - value:
                    property: ReviewerProposalAndEthicsReview.ProposalSufficient
                    equal: =Fail
                - value:
                    property: ReviewerProposalAndEthicsReview.EthicsSufficient
                    equal: =Fail
    event: ProposalReturnedForRevision
    sendMail:
      template: ProposalRejectedStudent
      to: Student

  # Rejection mail to Supervisor            
  - condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedSupervisor
                - event: ProposalRejectedSupervisor
          - logical:
              operator: Or
              children:
                - event: ProposalRejectedSupervisor
                - value:
                    property: ReviewerProposalAndEthicsReview.ProposalSufficient
                    equal: =Fail
                - value:
                    property: ReviewerProposalAndEthicsReview.EthicsSufficient
                    equal: =Fail
    sendMail:
      template: ProposalRejectedSupervisor
      to: Supervisor
  # Rejection mail to Coordinator 
  - condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedSupervisor
                - event: ProposalRejectedSupervisor
          - logical:
              operator: Or
              children:
                - event: ProposalRejectedSupervisor
                - value:
                    property: ReviewerProposalAndEthicsReview.ProposalSufficient
                    equal: =Fail
                - value:
                    property: ReviewerProposalAndEthicsReview.EthicsSufficient
                    equal: =Fail    
    sendMail:
      template: ProposalRejectedCoordinator
      to: Course.Coordinator