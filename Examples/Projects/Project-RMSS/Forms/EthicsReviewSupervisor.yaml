name: EthicsReviewSupervisor
property: SupervisorEthicsReview
targetForm: EthicsReview
title:
  en: Ethics assessment
  nl: Beoordeling ethiek

emitFormSubmitEvent: false
submittedWhenEvents: [EthicsApprovedSupervisor, EthicsRejectedSupervisor]

onSubmit:
  - condition:
      value:
        property: SupervisorEthicsReview.Sufficient
        equal: =Pass
    event: EthicsApprovedSupervisor
  - condition:
      not: true
      value:
        property: SupervisorEthicsReview.Sufficient
        equal: =Pass
    event: EthicsRejectedSupervisor
