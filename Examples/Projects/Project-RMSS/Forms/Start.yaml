name: Start
step: Start

onSubmit:
  - serviceCall:
      service: Turnitin
      operation: CreateSubmission
      inputs:
        Owner: Student
        Title: Title
  - setProperty:
      property: TurnitinId
      value: CreateSubmission.Id
  - serviceCall:
      service: Turnitin
      operation: UploadFile
      inputs:
        SubmissionId: CreateSubmission.Id
        File: Description
  - delay: 1m
    serviceCall:
      service: Turnitin
      operation: GenerateReport
      inputs:
        SubmissionId: TurnitinId

pages:
  - name: Contents
    title:
      en: Proposal
      nl: Voorstel
    fields:
      - Title
      - EC
      - Topic
      - Description
  - name: Staff
    title:
      en: Staff
      nl: Begeleiding
    fields:
      - Supervisor
  - name: ResearchLocation
    title:
      en: Research location
      nl: Onderzoekslocatie
    fields:
      - PartAbroad
      - Country
      - City
      - ContactPersonEmail
      - ContactPersonDescription
      - EmergencyPhoneNumber
  - name: Planning
    title:
      en: Planning
      nl: Planning
    fields:
      - StartDate
      - PlannedEndDate
