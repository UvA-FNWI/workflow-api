name: ProposalAndEthicsReviewSupervisor
title:
  en: Proposal and ethics review (supervisor)
  nl: Beoordeling voorstel en ethiek (begeleider)

property: SupervisorProposalAndEthicsReview
targetForm: ProposalAndEthicsReview
step: ProposalAssessmentSupervisor

emitFormSubmitEvent: false
submittedWhenEvents: [ ProposalApprovedSupervisor, ProposalRejectedSupervisor ]

onSubmit:
  - condition:
      logical:
        operator: And
        children:
          - value:
              property: SupervisorProposalAndEthicsReview.ProposalSufficient
              equal: =Pass
          - value:
              property: SupervisorProposalAndEthicsReview.EthicsSufficient
              equal: =Pass
    event: ProposalApprovedSupervisor
  - condition:
      logical:
        operator: Or
        children:
          - value:
              property: SupervisorProposalAndEthicsReview.ProposalSufficient
              equal: =Fail
          - value:
              property: SupervisorProposalAndEthicsReview.EthicsSufficient
              equal: =Fail
    event: ProposalRejectedSupervisor
    
    # If both assessments are done and either one has a rejection, create the ProposalReturnedForRevision event.
  - condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedReviewer
                - event: ProposalRejectedReviewer
          - logical:
              operator: Or
              children:
                - event: ProposalRejectedReviewer
                - value:
                    property: SupervisorProposalAndEthicsReview.ProposalSufficient
                    equal: =Fail
                - value:
                    property: SupervisorProposalAndEthicsReview.EthicsSufficient
                    equal: =Fail
    event: ProposalReturnedForRevision
    sendMail:
      template: ProposalRejectedStudent
      to: Student
  
  # Rejection mail to Coordinator     
  - condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedReviewer
                - event: ProposalRejectedReviewer
          - logical:
              operator: Or
              children:
                - event: ProposalRejectedReviewer
                - value:
                    property: SupervisorProposalAndEthicsReview.ProposalSufficient
                    equal: =Fail
                - value:
                    property: SupervisorProposalAndEthicsReview.EthicsSufficient
                    equal: =Fail
    sendMail:
      template: ProposalRejectedCoordinator
      to: Course.Coordinator
