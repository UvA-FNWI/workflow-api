name: ProposalReviewerReview
title:
  en: Research proposal and ethics review
  nl: Onderzoeksvoorstel en ethiek beoordeling

onSubmit:
  - condition:
      logical:
        operator: And
        children:
          - value:
              property: ProposalReviewerEthicsSufficient
              equal: =Pass
          - value:
              property: ProposalReviewerResearchProposalSufficient
              equal: =Pass
    event: ApproveProposalReviewer
  - condition:
      not: true
      logical:
        operator: And
        children:
          - value:
              property: ProposalReviewerEthicsSufficient
              equal: =Pass
          - value:
              property: ProposalReviewerResearchProposalSufficient
              equal: =Pass
    event: RejectProposalReviewer

pages:
  - name: Ethics
    title:
      en: Ethics
      nl: Ethiek
    fields:
      - ProposalReviewerEthicsSufficient
      - ProposalReviewerEthicsFeedback
  - name: Proposal
    title:
      en: Proposal
      nl: Voorstel
    fields:
      - ProposalReviewerResearchProposalSufficient
      - ProposalReviewerResearchProposalFeedback
