name: ThesisProposalReview
title:
  en: Research proposal and ethics review
  nl: Onderzoeksvoorstel en ethiek beoordeling

onSubmit:
  - condition:
      logical:
        operator: And
        children:
          - value:
              property: SupervisorEthicsSufficient
              equal: =Pass
          - value:
              property: SupervisorResearchProposalSufficient
              equal: =Pass
    event: ApproveSupervisor
  - condition:
      not: true
      logical:
        operator: And
        children:
          - value:
              property: SupervisorEthicsSufficient
              equal: =Pass
          - value:
              property: SupervisorResearchProposalSufficient
              equal: =Pass
    event: RejectSupervisor

pages:
  - name: Ethics
    title:
      en: Ethics
      nl: Ethiek
    fields:
      - SupervisorEthicsSufficient
      - SupervisorEthicsFeedback
  - name: Proposal
    title:
      en: Proposal
      nl: Voorstel
    fields:
      - SupervisorResearchProposalSufficient
      - SupervisorResearchProposalFeedback
