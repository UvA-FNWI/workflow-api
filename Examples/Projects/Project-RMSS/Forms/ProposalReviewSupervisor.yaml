name: ProposalReviewSupervisor
property: SupervisorProposalReview
targetForm: ProposalReview
title:
  en: Proposal assessment supervisor
  nl: Beoordeling voorstel supervisor

emitFormSubmitEvent: false
submittedWhenEvents: [ProposalApprovedSupervisor, ProposalRejectedSupervisor]

onSubmit:
  - condition:
      value:
        property: SupervisorProposalReview.Sufficient
        equal: =Pass
    event: ProposalApprovedSupervisor
  - condition:
      not: true
      value:
        property: SupervisorProposalReview.Sufficient
        equal: =Pass
    event: ProposalRejectedSupervisor
