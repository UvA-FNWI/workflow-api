name: Start

icon:
  type: article-line

title:
  nl: Voorstel indienen
  en: Submit proposal

properties:
  - name: Topic
    type: String!
    text:
      en: Topic
      nl: Onderwerp
    layout:
      multiline: true
  - name: PartAbroad
    type: PartAbroadType!
    text:
      en: Will part of the project take place abroad?
      nl: Zal een deel van het project in het buitenland plaatsvinden?
    layout:
      type: RadioList
    values:
      - name: Yes
        text:
          en: Yes
          nl: Ja
      - name: No
        text:
          en: No
          nl: Nee

  - name: Country
    type: Country!
    text:
      en: Country
      nl: Land
    layout:
      type: Dropdown
    condition:
      value:
        property: PartAbroad
        equal: =Yes

  - name: City
    type: String!
    text:
      en: City
      nl: Plaats
    condition:
      value:
        property: PartAbroad
        equal: =Yes

  - name: ContactPersonDescription
    type: String
    text:
      en: Description of contact person
      nl: Omschrijving van contactpersoon
    layout:
      multiline: true

  - name: ContactPersonEmail
    type: String
    text:
      en: Contact person email
      nl: E-mailadres contactpersoon

  - name: Description
    type: File!
    text:
      en: Upload a description
      nl: Upload een beschrijving

  - name: EmergencyPhoneNumber
    type: String!
    text:
      en: Emergency phone number
      nl: Telefoonnummer voor noodgevallen
    description:
      en: A phone number on which you can be reached in case of an emergency during your research.
      nl: Een telefoonnummer waarop je tijdens je onderzoek bij nood bereikbaar bent.

  - name: StartDate
    type: Date!
    text:
      en: Start date
      nl: Startdatum
    validation:
      message:
        en: Start date must be in the future
        nl: Startdatum moet in de toekomst liggen
      value:
        property: StartDate
        greaterThan: now

  - name: PlannedEndDate
    type: Date!
    text:
      en: Planned end date of the full thesis
      nl: Geplande einddatum van het volledige scriptietraject
    description:
      en: This is the planned end date for the entire thesis, not only for the fieldwork period.
      nl: Dit is de geplande einddatum van het volledige scriptietraject, niet alleen van de veldwerkperiode.
    validation:
      message:
        en: End date must be after start date
        nl: Einddatum moet na de startdatum zijn
      value:
        property: PlannedEndDate
        greaterThan: StartDate

ends:
  event: Start
