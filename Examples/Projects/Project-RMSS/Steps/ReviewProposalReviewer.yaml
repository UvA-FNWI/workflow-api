name: ReviewProposalReviewer
title:
  en: Review (proposal reviewer)
  nl: Beoordeling (voorstelbeoordelaar)

actions:
  - type: Submit
    roles: [ProposalReviewer]
    form: ProposalReviewerReview
    label:
      en: Submit review
      nl: Beoordeling indienen

properties:
  - name: ProposalReviewerResearchProposalSufficient
    type: ProposalReviewerResearchProposalSufficientType!
    text:
      en: Is the proposal sufficient?
      nl: Is het voorstel voldoende?
    layout:
      type: RadioList
    values:
      - name: Pass
        text:
          en: Pass
          nl: Voldoende
      - name: Fail
        text:
          en: Fail
          nl: Onvoldoende

  - name: ProposalReviewerResearchProposalFeedback
    type: String
    text:
      en: Feedback on proposal
      nl: Feedback op voorstel
    layout:
      multiline: true

  - name: ProposalReviewerEthicsSufficient
    type: ProposalReviewerEthicsSufficientType!
    text:
      en: Is the ethics declaration sufficient?
      nl: Is de ethiek verklaring voldoende?
    layout:
      type: RadioList
    values:
      - name: Pass
        text:
          en: Pass
          nl: Voldoende
      - name: Fail
        text:
          en: Fail
          nl: Onvoldoende

  - name: ProposalReviewerEthicsFeedback
    type: String
    text:
      en: Feedback on ethics
      nl: Feedback op ethiek
    layout:
      multiline: true

ends:
  logical:
    operator: Or
    children:
      - event: RejectProposalReviewer
      - event: ApproveProposalReviewer
