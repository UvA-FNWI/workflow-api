name: Ethics

icon:
  type: law-balance-line

title:
  en: Ethics
  nl: Ethiek

hierarchyMode: Parallel

children:
  - EthicsAssessmentSupervisor
  - EthicsAssessmentReviewer

headerStatus:
  # Approved only once both the supervisor and the reviewer have approved.
  - condition:
      logical:
        operator: And
        children:
          - event: EthicsApprovedSupervisor
          - event: EthicsApprovedReviewer
    type: Success
    label:
      en: Approved on {{ formatDate(EthicsApprovedReviewerEvent,=dd-MM-yyyy) }}
      nl: Goedgekeurd op {{ formatDate(EthicsApprovedReviewerEvent,=dd-MM-yyyy) }}
  # Changes needed if either reviewer rejects.
  - condition:
      logical:
        operator: Or
        children:
          - event: EthicsRejectedSupervisor
          - event: EthicsRejectedReviewer
    type: Attention
    label:
      en: Changes needed
      nl: Aanpassingen nodig