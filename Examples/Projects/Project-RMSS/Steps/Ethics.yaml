  - event: EthicsApprovedReviewer
    type: Success
    label:
      en: Approved on {{ formatDate(EthicsApprovedReviewerEvent,=dd-MM-yyyy) }}
      nl: Goedgekeurd op {{ formatDate(EthicsApprovedReviewerEvent,=dd-MM-yyyy) }}