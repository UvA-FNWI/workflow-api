name: Review
title:
  en: Review
  nl: Beoordeling

hierarchyMode: Parallel

ends:
  logical:
    operator: And
    children:
      - event: ApproveSupervisor
      - event: ApproveProposalReviewer

children:
  - ReviewSupervisor
  - ReviewProposalReviewer

properties:
  - name: ResearchProposalSufficient
    type: ResearchProposalSufficientType!
    text:
      en: Is the proposal sufficient?
      nl: Is het voorstel voldoende?
    layout:
      type: RadioList
    values:
      - name: Pass
        text:
          en: Pass
          nl: Voldoende
      - name: Fail
        text:
          en: Fail
          nl: Onvoldoende

  - name: ResearchProposalFeedback
    type: String
    text:
      en: Feedback on proposal
      nl: Feedback op voorstel
    layout:
      multiline: true

  - name: EthicsSufficient
    type: EthicsSufficientType!
    text:
      en: Is the ethics declaration sufficient?
      nl: Is de ethiek verklaring voldoende?
    layout:
      type: RadioList
    values:
      - name: Pass
        text:
          en: Pass
          nl: Voldoende
      - name: Fail
        text:
          en: Fail
          nl: Onvoldoende

  - name: EthicsFeedback
    type: String
    text:
      en: Feedback on ethics
      nl: Feedback op ethiek
    layout:
      multiline: true