globalActions:
  - roles: [Student, Supervisor, ProposalReviewer]
    type: View
    forms: [Start]
  - roles: [Student, Supervisor, ProposalReviewer]
    type: View
    forms:
      - ProposalAndEthicsReviewSupervisor
      - ProposalAndEthicsReviewReviewer
  - roles: [Registered]
    type: CreateInstance
    userProperty: Student
  - roles: [Coordinator]
    type: Edit
    forms: [Start]
  - name: ViewTurnitinReport
    roles: [Supervisor, ProposalReviewer, Coordinator]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    steps: [ProposalAssessmentSupervisor, ProposalAssessmentReviewer]
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - redirect:
          url: "{{ GetReportUrl.ReportUrl }}"
