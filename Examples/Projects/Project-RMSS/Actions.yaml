globalActions:
  - roles: [ Student, Supervisor, Coordinator ]
    type: View
    forms: [ Start ]

  # Share the assessments after both have submitted if either outcome.
  - roles: [ Student,Supervisor,Coordinator ]
    type: View
    forms:
      - ProposalAndEthicsReviewSupervisor
      - ProposalAndEthicsReviewReviewer
    condition:
      logical:
        operator: And
        children:
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedSupervisor
                - event: ProposalRejectedSupervisor
          - logical:
              operator: Or
              children:
                - event: ProposalApprovedReviewer
                - event: ProposalRejectedReviewer

  # Supervisors can see their latest review, either approved or rejected.
  - roles: [ Supervisor ]
    type: View
    forms: [ ProposalAndEthicsReviewSupervisor ]
  
  # Reviewers can see their latest review, either approved or rejected.
  - roles: [ Coordinator ]
    type: View
    forms: [ ProposalAndEthicsReviewReviewer ]

  - roles: [ Registered ]
    type: CreateInstance
    userProperty: Student
    
  - roles: [ Coordinator ]
    type: Edit
    forms: [ Start ]
