name: ProposalRejectedStudent
layout: default
subject:
  en: "Adjustments are needed for your thesis proposal or ethics submission"
  nl: "Er zijn wijziginen nodig voor jouw ingezonden scriptie of ethiek"
body:
  en: |
    Dear {{ coalesce(Student.DisplayName, =student) }},
  
    Thank you for submitting your thesispropsal and ethics. 
    Some adjustments are needed before you can proceed.
    
    Log in to see what was already correct and what needs to be adjusted.
    
    You have until August 11th to submit the adjusted version.
    Good luck!
  nl: |
    Beste {{ coalesce(Student.DisplayName, =student) }},

    Bedankt voor het insturen van jouw scriptie en ethiek.
    Er zijn wijzigingen nodig voordat je verder kunt gaan.

    Log in om te zien wat er correct was en wat geupdatet moet worden.

    Je hebt tot 11 augustus de tijd voor een nieuwe versie.
    Succes!
buttons:
  - label:
      en: "View feedback"
      nl: "Feedback bekijken"
    url: "{{ FrontendBaseUrl }}/instance/{{ Id }}"
