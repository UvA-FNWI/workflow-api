name: AssessmentSupervisor
title: Assessment by supervisor

actions:
  - roles: [Supervisor]
    type: Submit
    label: Assess final version (supervisor)
    form: AssessmentSupervisor
  - name: ViewTurnitinReport
    roles: [Supervisor, Examiner, Coordinator]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - redirect:
          url: "{{ GetReportUrl.ReportUrl }}"

properties:
  - name: AssessmentSupervisor
    type: Assessment!

ends:
  event: AssessmentSupervisor