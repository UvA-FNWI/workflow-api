name: AssessmentSupervisor
title: Assessment by supervisor

actions:
  - roles: [Supervisor]
    type: Submit
    label: Assess final version (supervisor)
    form: AssessmentSupervisor
  - name: GenerateTurnitinReport
    roles: [Supervisor, Examiner, Coordinator]
    type: Execute
    label:
      en: Generate Turnitin report
      nl: Genereer Turnitin rapport
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GenerateReport
          inputs:
            SubmissionId: TurnitinId
  - name: ViewTurnitinReport
    roles: [Supervisor, Examiner, Coordinator]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - setProperty:
          property: TurnitinReportUrl
          value: GetReportUrl.ReportUrl
      - redirect:
          url: "{{ TurnitinReportUrl }}"

properties:
  - name: AssessmentSupervisor
    type: Assessment!

ends:
  event: AssessmentSupervisor