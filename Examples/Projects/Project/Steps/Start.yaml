name: Start
icon: article-line
title:
  nl: Indienen voorstel
  en: Subject proposal

condition: 
  deadline: addMonths(CreateDate, 2)
    
actions:
  - roles: [Student]
    type: Submit
    form: Start
  - roles: [Student]
    type: Execute
    name: SubmitFinalGrade
    label:
      en: Submit grade
      nl: Beoordeling indienen
    onAction:
    - name: SubmitFinalGrade
      serviceCall:
        service: DataNose
        operation: FinalGradeSubmission
        inputs:
          CourseExternalId: Course.ExternalId
          Student: Student
          Grade: =9
          ExamDate: EndDate
          Title: Title
          Supervisor: Supervisor
          Examiner: Examiner
          ExamType: =Exam
    - redirect:
        url: "{{ SubmitFinalGrade.SigningUrl }}"
properties:
  - name: Subject
    type: String!
    text:
      en: Subject
      nl: Onderwerp
    layout:
      multiline: true
  - name: Description
    type: File!
    text:
      en: Project description
      nl: Projectomschrijving
  - name: TestDocument
    type: File
    text:
      en: Test document
      nl: Testdocument

  - name: Deadline
    type: Date!
    text:
      en: Important deadline
      nl: Belangrijke deadline


ends:
  event:
    id: Start
    notBefore: RejectSubject
