name: Publication
title:
  en: Publication
  nl: Publicatie
  
condition:
  logical:
    operator: And
    children:
      - event: Upload
      - value:
          property: CanBePublished
          equal: true

actions:
  - roles: [Supervisor]
    type: Execute
    label: Confirm thesis publication
    name: Publish

ends:
  event: Publish