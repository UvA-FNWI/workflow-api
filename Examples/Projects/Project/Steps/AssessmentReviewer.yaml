name: AssessmentReviewer
title: Assessment by reviewer

actions:
  - roles: [Reviewer]
    type: Submit
    label: Assess final version (reviewer)
    form: AssessmentReviewer
  - name: GenerateTurnitinReport
    roles: [Reviewer, Examiner, Coordinator]
    type: Execute
    label:
      en: Generate Turnitin report
      nl: Genereer Turnitin rapport
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GenerateReport
          inputs:
            SubmissionId: TurnitinId
  - name: ViewTurnitinReport
    roles: [Reviewer, Examiner, Coordinator]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - setProperty:
          property: TurnitinReportUrl
          value: GetReportUrl.ReportUrl
      - redirect:
          url: "{{ TurnitinReportUrl }}"

properties:
  - name: AssessmentReviewer
    type: Assessment!

ends:
  event: AssessmentReviewer