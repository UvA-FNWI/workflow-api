name: SubjectFeedback
title:
  nl: Goedkeuren voorstel
  en: Approve proposal
icon:
  type: checkmark-line
  color: green

actions:
- name: Approve
  type: Submit
  form: ApproveSubject
  roles: [Coordinator]
  label:
    en: Approve
    nl: Goedkeuren
- name: Reject
  type: Submit
  form: RejectSubject
  intent: Destructive
  roles: [Coordinator]
  label:
    en: Reject
    nl: Afkeuren

properties:
  - name: SubjectRejectReason
    type: String!
    text:
      nl: Licht toe, wees daarbij zo specifiek mogelijk
      en: Please explain, be as specific as possible
    layout:
      multiline: true
      
progress:
  color: red
  text:
    en: Waits {{ coalesce(formatDate(StartEvent, =dd/MM), =) }} for approval
    nl: Wacht {{ coalesce(formatDate(StartEvent, =dd-MM), =) }} op goedkeuring

ends: 
  logical:
    operator: Or
    children: 
    - event: RejectSubject
    - event: ApproveSubject
