    type: String!
    text:
      en: Working title
      nl: Werktitel
  - name: EC
    type: Int!

  - name: StartDate
    type: Date!
    text:
      en: Start date
      nl: Startdatum
  - name: EndDate
    type: Date!
    text:
      en: End date
      nl: Einddatum

  - name: Examiner
    type: User!
    text: 
