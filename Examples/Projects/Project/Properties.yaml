      nl: Begeleider

  - name: Reviewer
    type: User!
    text: 
      en: Second Reviewer
      nl: Tweede beoordelaar
        
  - name: SecondReader
    type: User!
    allowsAssignment: true
    text: 
      en: Second reader
      nl: Tweede lezer
      
  - name: Student
    type: User!
  
  - name: PracticalSupervisor
    type: "[User]!"
    text: 
      en: Practical supervisor
      nl: Praktijkbegeleider
    allowsExternalUsers: true
    allowsAssignment: true
      
  - name: Report
    type: File!
  
  - name: TurnitinId
    type: String
