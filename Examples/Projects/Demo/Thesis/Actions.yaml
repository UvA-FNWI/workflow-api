globalActions:
  - roles: [Student, Supervisor, SecondReviewer, Coordinator]
    type: View
    forms: [SubmitProposal, Upload, RejectProposal]
  - roles: [Registered]
    type: CreateInstance
    userProperty: Student
  - roles: [Coordinator]
    type: Edit
    forms: [SubmitProposal]
  - roles: [Supervisor, Coordinator]
    type: View
    forms: [AssessmentSupervisor]
  - roles: [SecondReviewer, Coordinator]
    type: View
    forms: [AssessmentSecondReader]
  - roles: [Coordinator]
    type: ViewHidden
  # Supervisor-only button at the assessment step: opens the Turnitin similarity report
  - name: ViewTurnitinReport
    roles: [Supervisor]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    steps: [AssessmentSupervisor]
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - redirect:
          url: "{{ GetReportUrl.ReportUrl }}"
