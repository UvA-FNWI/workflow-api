name: Assessment
title:
  en: Final Assessment
  nl: Eind beoordeling
layout: Compact

pages:
  - name: PlagiarismCheck
    title:
      en: Plagiarism check
      nl: Plagiaatcontrole
    introduction:
      en: Open the similarity report with the "View Turnitin report" button on this step, then confirm below.
      nl: Open het gelijkenisrapport met de knop "Bekijk Turnitin-rapport" bij deze stap en bevestig hieronder.
    fields:
      - ReportViewed
    sources: [AssessmentSupervisor]

  - name: Rubric
    title:
      en: Rubric
      nl: Rubric
    introduction:
      en: Select a grade for each criterion. The final grade is a weighted average.
      nl: Kies per criterium een cijfer. Het eindcijfer is een gewogen gemiddelde.
    fields:
      - ProblemStatement
      - Methodology
      - ResultsPresentation
    sources: [AssessmentSupervisor, AssessmentSecondReader]

  - name: Comments
    title:
      en: Comments
      nl: Opmerkingen
    fields:
      - Comments
    sources: [AssessmentSupervisor, AssessmentSecondReader]

  - name: CombinedComments
    title:
      en: Comments
      nl: Opmerkingen
    fields:
      - Comments
    sources: [AssessmentCombined]
