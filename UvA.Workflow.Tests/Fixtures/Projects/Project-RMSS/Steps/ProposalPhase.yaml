name: ProposalPhase

icon:
  type: article-line

title:
  en: Proposal
  nl: Voorstel

children:
  - Start
  - ProposalAssessment

headerStatus:
  # Approved only once both the supervisor and the proposal reviewer have approved.
  - condition:
      logical:
        operator: And
        children:
          - event: ProposalApprovedSupervisor
          - event: ProposalApprovedReviewer
    type: Success
    label:
      en: Approved on {{ formatDate(ProposalApprovedReviewerEvent,=dd-MM-yyyy) }}
      nl: Goedgekeurd op {{ formatDate(ProposalApprovedReviewerEvent,=dd-MM-yyyy) }}
  # Changes needed if either reviewer rejects.
  - event: ProposalReturnedForRevision
    type: Attention
    label:
      en: Changes needed
      nl: Aanpassingen nodig
  # Stays "waiting" while one approval is still outstanding.
  - event: Start
    type: Info
    label:
      en: Waiting for approval
      nl: Wacht op goedkeuring
