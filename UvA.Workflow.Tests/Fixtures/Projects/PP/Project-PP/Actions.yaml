globalActions:
  - roles: [Student, Coordinator, Examiner, SecondReviewer, Supervisor, CoSupervisor]
    type: View
    forms: [Start, UploadFinalThesis]
  - roles: [Coordinator, Supervisor]
    type: View
    forms: [AssessmentSupervisor]
  - roles: [Coordinator, CoSupervisor, SecondReviewer, Supervisor]
    type: View
    forms: [AssessmentPresentation]
  - type: View
    roles: [Supervisor]
    forms: [AssessmentSecondReader]
    condition:
      event: AssessmentSupervisor
  - roles: [SecondReviewer]
    forms: [AssessmentSupervisor]
    condition:
      event: AssessmentSecondReader
  - roles: [Coordinator, Supervisor, SecondReviewer]
    type: View
    forms: [AssessmentCombined, FinalGrade, AssessmentPresentation]
  - roles: [Coordinator, SecondReviewer]
    type: View
    forms: [AssessmentSecondReader]
  - roles: [SystemAdmin]
    type: CreateInstance
    userProperty: Student
  - roles: [Coordinator]
    type: Edit
    forms: [Start]
  - roles: [Student]
    type: ViewResults
    forms: [AssessmentSupervisor, AssessmentSecondReader, AssessmentCombined]
    condition:
      event: FinalGrade
  - roles: [Student]
    type: View
    forms: [AssessmentPresentation]
    condition:
      event: FinalGrade