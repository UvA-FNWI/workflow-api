globalActions:
  - roles: [Student, Supervisor, Coordinator]
    type: View
    forms: [Start, Upload, Proposal, RejectSubject]
  - roles: [Registered]
    type: CreateInstance
    userProperty: Student
  - roles: [Coordinator]
    type: Edit
    forms: [Start]
  - roles: [Supervisor, Coordinator]
    type: View
    forms: [AssessmentSupervisor]
  - roles: [Reviewer, Coordinator]
    type: View
    forms: [AssessmentReviewer]
  - name: ViewTurnitinReport
    roles: [Supervisor, Reviewer, Examiner, Coordinator]
    type: Execute
    label:
      en: View Turnitin report
      nl: Bekijk Turnitin-rapport
    steps: [AssessmentSupervisor, AssessmentReviewer]
    onAction:
      - serviceCall:
          service: Turnitin
          operation: GetReportUrl
          inputs:
            SubmissionId: TurnitinId
      - redirect:
          url: "{{ GetReportUrl.ReportUrl }}"